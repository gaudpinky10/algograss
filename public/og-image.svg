<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#060B14"/>
  <!-- Gradient circles -->
  <circle cx="900" cy="150" r="400" fill="radial-gradient" opacity="0.4"/>
  <radialGradient id="g1" cx="75%" cy="25%" r="40%">
    <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#00D4AA" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="g2" cx="20%" cy="75%" r="35%">
    <stop offset="0%" stop-color="#7C9EFF" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#7C9EFF" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>
  <!-- Logo shield -->
  <path d="M96 120 L128 108 L160 120 L160 156 Q160 180 128 192 Q96 180 96 156 Z" fill="url(#logoGrad)" opacity="0.9"/>
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#7C9EFF"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#7C9EFF"/>
    </linearGradient>
  </defs>
  <path d="M114 152 L122 160 L144 138" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- AlgoGrass text -->
  <text x="176" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="url(#textGrad)">AlgoGrass</text>
  <!-- Tagline -->
  <text x="96" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#E8F0FE">GDPR Compliance</text>
  <text x="96" y="348" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#E8F0FE">Made Simple</text>
  <!-- Description -->
  <text x="96" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="rgba(232,240,254,0.55)">Free website scanner + compliance tools for UK &amp; EU businesses.</text>
  <text x="96" y="466" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="rgba(232,240,254,0.55)">60 days free — no credit card required.</text>
  <!-- Badges -->
  <rect x="96" y="520" width="180" height="44" rx="22" fill="rgba(0,212,170,0.12)" stroke="rgba(0,212,170,0.3)" stroke-width="1"/>
  <text x="186" y="547" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#00D4AA" text-anchor="middle" font-weight="600">UK GDPR</text>
  <rect x="292" y="520" width="210" height="44" rx="22" fill="rgba(124,158,255,0.12)" stroke="rgba(124,158,255,0.3)" stroke-width="1"/>
  <text x="397" y="547" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#7C9EFF" text-anchor="middle" font-weight="600">ICO Compliant</text>
  <rect x="518" y="520" width="220" height="44" rx="22" fill="rgba(0,212,170,0.08)" stroke="rgba(0,212,170,0.2)" stroke-width="1"/>
  <text x="628" y="547" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#00D4AA" text-anchor="middle" font-weight="600">Free Scanner</text>
  <!-- URL -->
  <text x="1104" y="580" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="rgba(232,240,254,0.35)" text-anchor="end">algograss.co.uk</text>
</svg>
